name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: purescript-contrib/setup-purescript@main
        with:
          purescript: "0.15.15"
          purs-tidy: "latest"
          spago: "unstable"

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting (purs-tidy)
        run: purs-tidy check src test

      - name: Build
        run: spago build

      - name: Test
        run: spago test
