name: Stories

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: purescript-contrib/setup-purescript@main
        with:
          purescript: "0.15.15"
          purs-tidy: "latest"
          spago: "unstable"

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Install purs-backend-es
        run: bun add --global purs-backend-es

      - name: Build Yoga Stories
        run: bunx yoga-stories build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
