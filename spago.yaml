    - react-basic-hooks: ">=8.2.0 <9.0.0"
    - typelevel-prelude: ">=7.0.0 <8.0.0"
    - unsafe-coerce: ">=6.0.0 <7.0.0"
    - yoga-react-dom: ">=1.0.3 <2.0.0"
  test:
