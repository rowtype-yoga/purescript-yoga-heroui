workspace:
  extraPackages:
    react-testing-library:
      path: ../purescript-react-testing-library

package:
  name: yoga-heroui
  publish:
    version: 2.0.1
    license: WTFPL
    location:
      githubOwner: rowtype-yoga
      githubRepo: purescript-yoga-heroui
  dependencies:
    - effect: ">=4.0.0 <5.0.0"
    - foreign: ">=7.0.0 <8.0.0"
    - functions: ">=6.0.0 <7.0.0"
